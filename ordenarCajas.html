<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenar Boxs</title>
    <style>
        .contenedor{
            position: relative;
            border: 1px dashed #333;
            width: 500px;
            height: 200px;
             margin: 0 auto;
            background-color: white;
            border: dashed 5px #333;
            padding: 20px;
        }
        .box-1{
             background-color: #ff4757;
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100px;
            height: 50px;
            color: black;
        }
        .box-2{
             background-color: orange;
            position: absolute;
            top: 0px;
            right: 0px;
            width: 100px;
            height: 50px;
            color: black;
            text-align: center;
        }
        
         .box-3{
             background-color: yellow;
            position: absolute;
            top: 190px;
            left: 0px;
            width: 100px;
            height: 50px;
            color: black;
            text-align: center;
        }
        
         .box-4{
             background-color: green;
            position: absolute;
            top: 190px;
            right: 0px;
            width: 100px;
            height: 50px;
            color: black;
            text-align: center;
        }
        
         .box-5{
             background-color: blue;
            position: absolute;
            top: 40%;
            width: 80px;
            left: 40%;
            height: 40px;
            color: black;
            text-align: center;
        }


       
    </style>
</head>
<body>
    <div class="contenedor">
       
       <div class="box-1">1</div>

       <div class="box-2">2</div>

       <div class="box-3">3</div>
       <div class="box-4">4</div>
       <div class="box-5">5</div>
    </div>
    
</body>
</html>
